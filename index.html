<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WORCAP 2025 - Links</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div id="star-background"></div>

    <div class="container">
        <header class="profile">
            <img src="assets/perfil_transparent2.png" alt="Logo do WorCAP 2025" class="logo">
            <p>Workshop em Computação Aplicada</p>
        </header>

        <main class="links">
            <a href="https://www.gov.br/inpe/pt-br/eventos/worcap-2026" target="_blank" class="link-card">
                <div class="icon"><i class="fas fa-globe"></i></div>
                <div class="text">Site Oficial</div>
            </a>
            <a href="https://www.gov.br/inpe/pt-br/eventos/worcap-2026/submissoes" target="_blank" class="link-card">
                <div class="icon"><i class="fa-solid fa-paperclip"></i></div>
                <div class="text">Envie seu Trabalho</div>
            </a>
            <a href="https://selperbrasil.org.br/inscricao/inscricao-worcap2026/" target="_blank" class="link-card">
                <div class="icon"><i class="fa-solid fa-right-to-bracket"></i></div>
                <div class="text">Inscreva-se</div>
            </a>
            <a href="https://zenodo.org/communities/worcap2025/" target="_blank" class="link-card">
                <div class="icon"><i class="fas fa-newspaper"></i></div>
                <div class="text">Trabalhos Aprovados em 2025</div>
            </a>
            <a href="https://www.instagram.com/worcap?igsh=MThhcDZxbXZzaGF6dw==" target="_blank" class="link-card">
                <div class="icon"><i class="fab fa-instagram"></i></div>
                <div class="text">Instagram</div>
            </a>
            <a href="mailto:worcap@inpe.br" class="link-card">
                <div class="icon"><i class="fas fa-envelope"></i></div>
                <div class="text">Contato por E-mail</div>
            </a>
        </main>

        <footer class="footer">
            <p>&copy; 2026 WORCAP. Todos os direitos reservados.</p>
        </footer>
    </div>

    <script src="script.js"></script>

</body>
</html>
